  <line x1="30" y1="55" x2="25" y2="60" stroke="#171717" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="70" y1="55" x2="75" y2="60" stroke="#171717" stroke-width="1.5" stroke-dasharray="2,2"/>
</svg>
